<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>みんなの発信 — mio億トレ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F7F2EA;
  --bg-soft: #EFE7DA;
  --bg-card: #FFFEFB;

  --ink: #3A2E2A;
  --ink-mid: #6B5D57;
  --ink-soft: #998B83;

  --rose: #C98B95;
  --rose-soft: #E8D0D2;
  --sage: #9BB59C;
  --sage-soft: #D5DFCE;
  --honey: #D4B677;
  --honey-soft: #ECDDB8;
  --mauve: #A89BB0;
  --mauve-soft: #DCD3DC;
  --terra: #C28D6F;
  --terra-soft: #E8D5C5;

  --line: rgba(58,46,42,0.08);
  --line-strong: rgba(58,46,42,0.14);
  --shadow-sm: 0 2px 8px rgba(58,46,42,0.04);
  --shadow-md: 0 8px 24px rgba(58,46,42,0.06);
  --shadow-lg: 0 16px 40px rgba(58,46,42,0.08);

  --r-lg: 20px;
  --r-md: 16px;
  --r-sm: 12px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family: 'Noto Sans JP', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-weight: 400;
  letter-spacing: 0.01em;
  overflow-x: hidden;
  font-feature-settings: "palt";
}

.app{
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 100px;
  overflow: hidden;
}
.app::before{
  content:''; position: absolute;
  top: -80px; right: -120px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(201,139,149,0.10), transparent 70%);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}
.app::after{
  content:''; position: absolute;
  top: 500px; left: -120px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(155,181,156,0.08), transparent 70%);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}

/* HEADER */
.page-header{
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(247,242,234,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn{
  width: 36px; height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  color: var(--ink-mid);
  transition: all 0.2s;
}
.back-btn:active{ transform: scale(0.96); }
.back-btn svg{ width: 16px; height: 16px; }
.page-title{
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.page-title .en{
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 12px;
  color: var(--ink-soft);
  margin-left: 6px;
}

/* MEMBER TABS */
.member-tabs{
  position: relative; z-index: 5;
  display: flex; gap: 10px;
  padding: 18px 18px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.member-tabs::-webkit-scrollbar{ display: none; }

.tab{
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 6px 4px 4px;
  transition: all 0.2s;
  position: relative;
}
.tab .tab-face-wrap{
  position: relative;
  transition: transform 0.2s;
}
.tab .tab-face{
  width: 54px; height: 54px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--bg);
  box-shadow: 0 2px 6px rgba(58,46,42,0.10);
  transition: all 0.2s;
}
.tab .tab-name{
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  transition: color 0.2s;
}
.tab.active .tab-face-wrap{ transform: scale(1.08); }
.tab.active .tab-face{
  border-color: var(--rose);
  box-shadow: 0 4px 14px rgba(201,139,149,0.32);
}
.tab.active .tab-name{ color: var(--ink); font-weight: 700; }
.tab.active::after{
  content:'';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px;
  background: var(--rose);
  border-radius: 50%;
}

/* PROFILE HEADER */
.profile{
  position: relative; z-index: 5;
  margin: 16px 18px 20px;
  padding: 24px 22px 20px;
  background: linear-gradient(135deg, #FAF0E8 0%, #F2E4D6 100%);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.profile-top{
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
.profile-face{
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--bg-card);
  box-shadow: 0 4px 14px rgba(58,46,42,0.12);
  flex-shrink: 0;
}
.profile-info{ flex: 1; min-width: 0; }
.profile-name{
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--ink);
  margin-bottom: 3px;
}
.profile-handle{
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.profile-role{
  font-size: 11px;
  color: var(--ink-mid);
  font-weight: 500;
  display: inline-block;
  padding: 3px 8px;
  background: rgba(58,46,42,0.05);
  border-radius: 4px;
  letter-spacing: 0.04em;
}

.profile-bio{
  font-size: 12px;
  color: var(--ink-mid);
  line-height: 1.7;
  margin-bottom: 16px;
  padding: 14px 0 0;
  border-top: 1px solid var(--line);
}

.profile-actions{
  display: flex;
  gap: 8px;
}
.btn-x{
  flex: 1;
  background: var(--ink);
  color: var(--bg);
  border-radius: 12px;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.btn-x:active{ transform: scale(0.98); }
.btn-x svg{ width: 13px; height: 13px; }
.btn-secondary{
  background: var(--bg-card);
  color: var(--ink-mid);
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.05em;
  cursor: pointer;
}
.btn-secondary svg{ width: 13px; height: 13px; }

/* X CTA CARD */
.x-cta-section{
  position: relative; z-index: 5;
  padding: 12px 18px 0;
}
.x-cta-card{
  display: flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 100%);
  color: #fff;
  padding: 20px 22px;
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}
.x-cta-card::before{
  content: '';
  position: absolute;
  top: -40%; right: -10%;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 60%);
  border-radius: 50%;
}
.x-cta-card:active{ transform: scale(0.98); }
.x-cta-card:hover{
  box-shadow: 0 12px 32px rgba(0,0,0,0.18);
  transform: translateY(-2px);
}
.x-cta-icon{
  width: 44px; height: 44px;
  background: #fff;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative; z-index: 1;
}
.x-cta-icon svg{
  width: 22px; height: 22px;
  color: #000;
}
.x-cta-body{ flex: 1; min-width: 0; position: relative; z-index: 1; }
.x-cta-eyebrow{
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.x-cta-title{
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  margin-bottom: 4px;
  line-height: 1.4;
}
.x-cta-hint{
  font-size: 10.5px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
}
.x-cta-arrow{
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: #fff;
  position: relative; z-index: 1;
}
.x-cta-arrow svg{ width: 14px; height: 14px; }
.x-cta-note{
  margin: 12px 4px 0;
  font-size: 10px;
  color: var(--ink-soft);
  text-align: center;
  font-style: italic;
  letter-spacing: 0.04em;
}

/* FILTER BAR */
.filter-bar{
  position: relative; z-index: 5;
  padding: 0 18px 8px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar{ display: none; }
.filter-chip{
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 6px 12px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: var(--bg-card);
  color: var(--ink-mid);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
}
.filter-chip.active{
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* SECTION DIVIDER */
.divider-label{
  position: relative; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  padding: 14px 22px 10px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.divider-label::after{
  content:'';
  flex: 1;
  height: 1px;
  background: var(--line-strong);
}

/* POSTS */
.posts{
  position: relative; z-index: 5;
  padding: 0 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.post{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
}
.post:active{ transform: translateY(1px); }

.post-pinned{
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 600;
  color: var(--rose);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.post-pinned svg{ width: 11px; height: 11px; }

.post-header{
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.post-avatar{
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.post-name-row{ flex: 1; min-width: 0; }
.post-name{
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--ink);
  display: flex; align-items: center; gap: 4px;
}
.post-name .verified{
  color: var(--rose);
}
.post-name .verified svg{ width: 12px; height: 12px; }
.post-meta{
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  color: var(--ink-soft);
  font-weight: 400;
  letter-spacing: 0.02em;
}
.post-time{ display: inline; }
.post-time::before{ content:' · '; }
.post-handle{ display: inline; }

.x-icon-mini{
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--bg-soft);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-mid);
  flex-shrink: 0;
}
.x-icon-mini svg{ width: 11px; height: 11px; }

.post-body{
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink);
  letter-spacing: 0.02em;
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.post-body .tag{ color: var(--rose); font-weight: 500; }
.post-body .mention{ color: var(--mauve); font-weight: 500; }

.post-image{
  width: 100%;
  height: 180px;
  border-radius: var(--r-sm);
  margin-bottom: 12px;
  overflow: hidden;
  position: relative;
  background: var(--bg-soft);
  border: 1px solid var(--line);
}
.post-image.chart{
  background: linear-gradient(135deg, #F2E4D6 0%, #E8D5C5 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.post-image.chart::before{
  content: 'CHART';
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--ink-soft);
  font-weight: 500;
}
.post-image svg{
  width: 100%; height: 100%;
  position: absolute;
  top: 0; left: 0;
}

.post-actions{
  display: flex;
  align-items: center;
  gap: 22px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--ink-soft);
  font-weight: 500;
}
.post-action{
  display: flex;
  align-items: center;
  gap: 5px;
}
.post-action svg{ width: 14px; height: 14px; }
.post-action.like{ color: var(--rose); }

/* BOTTOM NAV (shared) */
.bottom-nav{
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(255, 254, 251, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  padding: 10px 16px 22px;
  display: flex; justify-content: space-around;
  z-index: 100;
}
.nav-item{
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 4px 8px;
  letter-spacing: 0.04em;
  min-width: 56px;
}
.nav-item.active{ color: var(--rose); }
.nav-item.active .ico{ background: var(--rose-soft); color: var(--rose); }
.nav-item .ico{
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  transition: all 0.2s;
}
.nav-item .ico svg{ width: 16px; height: 16px; }

</style>

<body>

<div class="app">

  <!-- PAGE HEADER -->
  <header class="page-header">
    <a class="back-btn" href="index.html" style="text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="page-title">みんなの発信 <span class="en">— Voices</span></div>
  </header>

  <!-- MEMBER TABS -->
  <div class="member-tabs" id="tabs">

<script>
// Member tab data
const MEMBERS = {
  mio: {
    name: 'mio',
    handle: '@Mio__1985',
    role: 'コミュニティ主宰',
    bio: '億トレを目指すコミュニティ「mio億トレ」主宰。FX・ゴールド・株式を独自の「みお手法」で攻略。初心者から経験者まで、勝てるトレーダーを育成しています。',
    xUrl: 'https://x.com/Mio__1985'
  },
  miyabi: {
    name: 'みやび',
    handle: '@miyabi_fx_1997',
    role: 'エントリー解説・マインドセット',
    bio: 'エントリーの精度と、トレーダーとしてのマインドセットを発信しています。穏やかに、でも確実に勝てる思考法を一緒に。',
    xUrl: 'https://x.com/miyabi_fx_1997'
  },
  sakura: {
    name: 'さくら',
    handle: '@sakura_dailyFX',
    role: '相場の振り返り',
    bio: '毎日の相場を振り返り、明日に活かすヒントを発信しています。継続は力なり🌸',
    xUrl: 'https://x.com/sakura_dailyFX'
  },
  hinata: {
    name: 'ひなた',
    handle: '@hinahina_FX1937',
    role: 'テクニカル分析',
    bio: 'テクニカル分析を軸に、チャートで語るタイプです。インジケーター・プライスアクション・出来高分析が好きです📈',
    xUrl: 'https://x.com/hinahina_FX1937'
  }
};

// Tab switching
const tabs = document.querySelectorAll('.tab');
const profileFace = document.querySelector('.profile-face');
const profileName = document.querySelector('.profile-name');
const profileHandle = document.querySelector('.profile-handle');
const profileRole = document.querySelector('.profile-role');
const profileBio = document.querySelector('.profile-bio');
const btnX = document.querySelector('.btn-x');
const xCtaCard = document.getElementById('x-cta-card');
const xCtaTitle = document.getElementById('x-cta-title');

const avatarSrcMap = {
  mio: document.querySelector('.tab[data-member="mio"] .tab-face').src,
  miyabi: document.querySelector('.tab[data-member="miyabi"] .tab-face').src,
  sakura: document.querySelector('.tab[data-member="sakura"] .tab-face').src,
  hinata: document.querySelector('.tab[data-member="hinata"] .tab-face').src
};

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    selectMember(tab.dataset.member);
  });
});

function selectMember(key) {
  if (!MEMBERS[key]) return;
  tabs.forEach(t => t.classList.toggle('active', t.dataset.member === key));
  const m = MEMBERS[key];
  profileFace.src = avatarSrcMap[key];
  profileName.textContent = m.name;
  profileHandle.textContent = m.handle;
  profileRole.textContent = m.role;
  profileBio.textContent = m.bio;
  btnX.href = m.xUrl;

  // Update X CTA card
  if (xCtaCard) xCtaCard.href = m.xUrl;
  if (xCtaTitle) xCtaTitle.textContent = m.handle + ' のアカウントを見る';
}

// Read URL param ?m=miyabi etc on load
const urlParams = new URLSearchParams(window.location.search);
const preselect = urlParams.get('m');
if (preselect && MEMBERS[preselect]) {
  selectMember(preselect);
}
</script>
