<script>
let allItems = [];
let activeTab = 'all';

function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day} ${hh}:${mm}`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'たった今';
  if (diff < 3600) return Math.floor(diff/60) + '分前';
  if (diff < 86400) return Math.floor(diff/3600) + '時間前';
  if (diff < 86400*7) return Math.floor(diff/86400) + '日前';
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${m}/${day}`;
}

const PERSONA_NAMES = {
  mio: '美桜Mio',
  miyabi: 'みやび',
  sakura: 'さくら',
  hinata: 'ひなた'
};

const NEWS_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></svg>';
const EVENT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>';
const EMPTY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h0M15 9h0"/></svg>';

async function loadData() {
  try {
    const [newsRes, eventsRes] = await Promise.all([
      sb.from('news_items').select('*').order('timestamp', { ascending: false }),
      sb.from('discord_events').select('*').order('datetime', { ascending: true })
    ]);

    const items = [];
    const news = newsRes.data || [];
    const events = eventsRes.data || [];
    const now = new Date();

    news.forEach(n => {
      items.push({
        kind: 'NEWS',
        time: new Date(n.timestamp || n.created_at),
        title: n.title || '',
        url: n.url || '',
        comment: n.comment || '',
        author: n.author || 'mio'
      });
    });

    events.forEach(e => {
      const t = new Date(e.datetime || e.created_at);
      if (t < now) return;  // only future events
      items.push({
        kind: 'EVENT',
        time: t,
        title: e.title || '',
        host: e.host || 'mio',
        isFuture: true
      });
    });

    // Sort: future events first by time asc, then news by time desc
    items.sort((a, b) => {
      if (a.isFuture && !b.isFuture) return -1;
      if (!a.isFuture && b.isFuture) return 1;
      if (a.isFuture) return a.time - b.time;
      return b.time - a.time;
    });

    allItems = items;
    updateCounts();
    render();
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('list').innerHTML = `
      <div class="empty-state">
        <div class="icon">${EMPTY_ICON}</div>
        <h3>読み込みエラー</h3>
        <p>少し時間をおいて再度お試しください</p>
      </div>
    `;
  }
}

function updateCounts() {
  document.getElementById('count-all').textContent = allItems.length;
  document.getElementById('count-news').textContent = allItems.filter(i => i.kind === 'NEWS').length;
  document.getElementById('count-event').textContent = allItems.filter(i => i.kind === 'EVENT').length;
}

function render() {
  const list = document.getElementById('list');
  let items = allItems;
  if (activeTab === 'news') items = items.filter(i => i.kind === 'NEWS');
  if (activeTab === 'event') items = items.filter(i => i.kind === 'EVENT');

  if (items.length === 0) {
    const msg = activeTab === 'news' ? 'ニュース' : activeTab === 'event' ? '配信予定' : '更新';
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">${EMPTY_ICON}</div>
        <h3>${msg}はまだありません</h3>
        <p>新しい${msg}が追加されるとここに表示されます</p>
      </div>
    `;
    return;
  }

  list.innerHTML = items.map(it => {
    if (it.kind === 'NEWS') {
      const href = it.url || 'news.html';
      const target = it.url ? '_blank' : '_self';
      return `
        <a class="news-card" href="${href}" ${it.url ? `target="${target}" rel="noopener"` : ''}>
          <div class="news-thumb">${NEWS_ICON}</div>
          <div class="news-body">
            <div class="news-meta-row">
              <span class="news-cat news">NEWS</span>
              <span class="news-date">${timeAgo(it.time)}</span>
            </div>
            <div class="news-title">${escapeHtml(it.title)}</div>
          </div>
        </a>
      `;
    } else {
      const hostName = PERSONA_NAMES[it.host] || it.host;
      return `
        <a class="news-card" href="events.html">
          <div class="news-thumb event-thumb">${EVENT_ICON}</div>
          <div class="news-body">
            <div class="news-meta-row">
              <span class="news-cat event">EVENT</span>
              <span class="event-time">${fmtDateTime(it.time)}</span>
            </div>
            <div class="news-title">${escapeHtml(it.title)}</div>
            <div class="news-comment"><div class="mini-av"></div>${escapeHtml(hostName)}がホスト</div>
          </div>
        </a>
      `;
    }
  }).join('');
}

function escapeHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    render();
  });
});

loadData();
</script>
