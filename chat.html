<style>
:root{
  --bg: #F7F2EA;
  --bg-soft: #EFE7DA;
  --bg-card: #FFFEFB;
  --ink: #3A2E2A;
  --ink-mid: #6B5D57;
  --ink-soft: #998B83;
  --rose: #C98B95;
  --rose-soft: #E8D0D2;
  --rose-deep: #B06B75;
  --line: rgba(58,46,42,0.08);
  --shadow-md: 0 8px 24px rgba(58,46,42,0.06);
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html, body{ height: 100%; }
body{
  font-family: 'Noto Sans JP', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.app{
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.page-header{
  flex-shrink: 0;
  background: rgba(247,242,234,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.back-btn{
  width: 36px; height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  color: var(--ink-mid);
  flex-shrink: 0;
}
.back-btn svg{ width: 16px; height: 16px; }
.page-title{
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 15px; font-weight: 600;
  letter-spacing: 0.04em; line-height: 1.2;
}
.page-title .en{
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 500;
  font-size: 10px; color: var(--rose-deep);
  margin-top: 2px;
}

/* LOCK HERO */
.lock-hero{
  flex: 1;
  padding: 36px 22px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  position: relative;
  overflow: hidden;
}
.lock-hero::before{
  content: '';
  position: absolute;
  top: 20%; left: 20%;
  width: 60%; height: 60%;
  background: radial-gradient(circle, rgba(232,208,210,0.25), transparent 70%);
  z-index: 0;
}
.lock-card{
  position: relative; z-index: 1;
  background: linear-gradient(135deg, #FFFEFB 0%, #F5EFE5 100%);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 36px 28px 30px;
  text-align: center;
  box-shadow: var(--shadow-md);
  max-width: 360px;
  width: 100%;
}
.lock-icon{
  width: 64px; height: 64px;
  margin: 0 auto 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #F5D9D3, #C98B95);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 16px rgba(201,139,149,0.25);
}
.lock-icon svg{ width: 28px; height: 28px; color: #fff; }
.lock-eyebrow{
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--rose-deep);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.lock-title{
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink);
  margin-bottom: 14px;
  line-height: 1.5;
}
.lock-text{
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.85;
  margin-bottom: 24px;
}
.lock-cta-row{
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.lock-cta{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 20px;
  border-radius: 999px;
  text-decoration: none;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  font-weight: 600;
  font-size: 12.5px;
  letter-spacing: 0.04em;
  transition: transform 0.15s, box-shadow 0.2s;
}
.lock-cta:active{ transform: scale(0.97); }
.lock-cta.line{ background: #06C755; color: #fff; }
.lock-cta.line:hover{ box-shadow: 0 6px 16px rgba(6,199,85,0.3); }
.lock-cta.discord{ background: #5865F2; color: #fff; }
.lock-cta.discord:hover{ box-shadow: 0 6px 16px rgba(88,101,242,0.3); }
.lock-cta svg{ width: 14px; height: 14px; }

/* BOTTOM NAV */
.bottom-nav{
  position: sticky; bottom: 0;
  background: rgba(247,242,234,0.92);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  padding: 10px 16px calc(22px + env(safe-area-inset-bottom));
  display: flex; justify-content: space-around;
  z-index: 100;
}
.nav-item{
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px; font-weight: 500;
  color: var(--ink-soft);
  padding: 4px 8px;
  letter-spacing: 0.04em;
  min-width: 56px;
  text-decoration: none;
}
.nav-item .ico{
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
}
.nav-item .ico svg{ width: 16px; height: 16px; }
.nav-item.active{ color: var(--rose-deep); }
.nav-item.active .ico{ background: var(--rose-soft); color: var(--rose-deep); }
</style>
