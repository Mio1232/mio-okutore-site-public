<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>経済指標カレンダー — mio億トレ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F7F2EA;
  --bg-soft: #EFE7DA;
  --bg-card: #FFFEFB;

  --ink: #3A2E2A;
  --ink-mid: #6B5D57;
  --ink-soft: #998B83;

  --rose: #C98B95;
  --rose-soft: #E8D0D2;
  --sage: #9BB59C;
  --sage-soft: #D5DFCE;
  --honey: #D4B677;
  --honey-soft: #ECDDB8;
  --mauve: #A89BB0;
  --mauve-soft: #DCD3DC;
  --terra: #C28D6F;
  --terra-soft: #E8D5C5;

  /* Impact colors */
  --high: #C76B6B;
  --high-soft: #F2DCDC;
  --mid: #D4B677;
  --mid-soft: #ECDDB8;
  --low: #9BB59C;
  --low-soft: #D5DFCE;

  --line: rgba(58,46,42,0.08);
  --line-strong: rgba(58,46,42,0.14);
  --shadow-sm: 0 2px 8px rgba(58,46,42,0.04);
  --shadow-md: 0 8px 24px rgba(58,46,42,0.06);

  --r-lg: 20px;
  --r-md: 16px;
  --r-sm: 12px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family: 'Noto Sans JP', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-weight: 400;
  letter-spacing: 0.01em;
  overflow-x: hidden;
  font-feature-settings: "palt";
}

.app{
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 100px;
  overflow: hidden;
}
.app::before{
  content:''; position: absolute;
  top: -80px; right: -120px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(168,155,176,0.10), transparent 70%);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}
.app::after{
  content:''; position: absolute;
  top: 600px; left: -120px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(212,182,119,0.08), transparent 70%);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}

/* HEADER */
.page-header{
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(247,242,234,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn{
  width: 36px; height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  color: var(--ink-mid);
  transition: all 0.2s;
  text-decoration: none;
}
.back-btn:active{ transform: scale(0.96); }
.back-btn svg{ width: 16px; height: 16px; }
.page-title{
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.page-title .en{
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 12px;
  color: var(--ink-soft);
  margin-left: 6px;
}
.header-icon{
  width: 36px; height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--ink-mid);
  flex-shrink: 0;
}
.header-icon svg{ width: 15px; height: 15px; }

/* HOST CARD (Hinata) */
.host-card{
  position: relative; z-index: 5;
  margin: 16px 18px 20px;
  padding: 20px;
  background: linear-gradient(135deg, #F5EFE5 0%, #EBE0D0 100%);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.host-face{
  width: 52px; height: 52px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--bg-card);
  box-shadow: 0 4px 12px rgba(58,46,42,0.10);
  flex-shrink: 0;
}
.host-body{ flex: 1; min-width: 0; }
.host-name-row{
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.host-name{
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--ink);
}
.host-tag{
  font-family: 'Inter', sans-serif;
  font-size: 8.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--mauve);
  background: var(--mauve-soft);
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}
.host-msg{
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-mid);
  font-weight: 400;
}
.host-msg .em{ color: var(--ink); font-weight: 600; }

/* LOCKED hinata comment styles */
.host-msg-locked{
  margin-top: 8px;
  padding: 14px 16px;
  background: linear-gradient(135deg, #F5EFE5 0%, #EBE0D0 100%);
  border-radius: 12px;
  border: 1px solid var(--line);
}
.locked-row{
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 11.5px;
  color: var(--ink-soft, #998B83);
  margin-bottom: 12px;
  line-height: 1.7;
}
.locked-row strong{ color: var(--rose-deep, #B06B75); font-weight: 600; }
.lock-mini{ width: 14px; height: 14px; color: var(--rose-deep, #B06B75); flex-shrink: 0; margin-top: 2px; }
.locked-cta-row{
  display: flex;
  gap: 6px;
}
.locked-cta{
  flex: 1;
  display: block;
  text-align: center;
  padding: 8px 4px;
  border-radius: 999px;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  font-size: 10.5px;
  font-weight: 600;
  text-decoration: none;
  color: #fff;
  transition: transform 0.15s, opacity 0.2s;
}
.locked-cta:active{ transform: scale(0.97); }
.locked-cta.line{ background: #06C755; }
.locked-cta.discord{ background: #5865F2; }

/* SUMMARY STRIP */
.summary-strip{
  position: relative; z-index: 5;
  margin: 0 18px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.summary-cell{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 12px 12px;
  box-shadow: var(--shadow-sm);
}
.summary-label{
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.summary-value{
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: 0.02em;
}
.summary-cell.high .summary-value{ color: var(--high); }
.summary-sub{
  font-size: 10px;
  color: var(--ink-soft);
  margin-top: 2px;
  font-weight: 500;
}

/* DAY TABS */
.day-tabs{
  position: relative; z-index: 5;
  display: flex;
  gap: 8px;
  padding: 4px 18px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar{ display: none; }
.day-tab{
  flex-shrink: 0;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px 14px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 60px;
}
.day-tab .dow{
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.day-tab .date{
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1;
}
.day-tab .dot{
  width: 4px; height: 4px;
  background: var(--ink-soft);
  border-radius: 50%;
  margin: 5px auto 0;
  opacity: 0;
}
.day-tab.has-event .dot{ opacity: 1; background: var(--mauve); }
.day-tab.has-high .dot{ opacity: 1; background: var(--high); }
.day-tab.active{
  background: var(--ink);
  border-color: var(--ink);
}
.day-tab.active .dow,
.day-tab.active .date{ color: var(--bg); }
.day-tab.active .dot{ background: var(--bg); opacity: 1; }
.day-tab.today{
  border-color: var(--rose);
}
.day-tab.today .dow{ color: var(--rose); }
.day-tab.today.active{ background: var(--ink); }
.day-tab.today.active .dow,
.day-tab.today.active .date{ color: var(--bg); }

/* SECTION DIVIDER */
.section-label{
  position: relative; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  padding: 4px 22px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.section-label::after{
  content:'';
  flex: 1;
  height: 1px;
  background: var(--line-strong);
}
.section-label .date-text{
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-mid);
  letter-spacing: 0.04em;
  text-transform: none;
}

/* ECONOMIC CALENDAR EMBED */
.admin-gear{
  position: absolute;
  top: 10px; right: 10px;
  width: 30px; height: 30px;
  background: rgba(255,255,255,0.85);
  border: 1px solid var(--line);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  text-decoration: none;
  z-index: 10;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.admin-gear:hover{ opacity: 1; }
.admin-gear svg{ width: 14px; height: 14px; }
.host-card{ position: relative; }
.econ-section{
  position: relative; z-index: 5;
  margin: 0 0 20px;
}
.calendar-frame{
  margin: 0 16px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  height: 500px;
}
.calendar-frame iframe{
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
}
.badge-en{
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  font-weight: 500;
  color: var(--rose-deep);
  letter-spacing: 0.08em;
  margin-left: auto;
  text-transform: none;
}
.source-note{
  display: flex; align-items: center; gap: 6px;
  margin: 14px 22px 0;
  padding: 8px 12px;
  background: var(--bg-soft);
  border-radius: 999px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
}
.source-note .dot{
  width: 6px; height: 6px;
  background: var(--sage);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* EVENT CARDS */
.events{
  position: relative; z-index: 5;
  padding: 0 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.event{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
}
.event:active{ transform: translateY(1px); }
.event.high{
  border-left: 3px solid var(--high);
}
.event.mid{
  border-left: 3px solid var(--mid);
}
.event.low{
  border-left: 3px solid var(--low);
}

.event-row1{
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.event-time{
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
  min-width: 50px;
}
.event-flag{
  width: 22px; height: 16px;
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.event-country{
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-mid);
  letter-spacing: 0.08em;
  flex: 1;
}
.event-impact{
  display: flex;
  gap: 2px;
}
.event-impact .star{
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--line-strong);
}
.event.high .event-impact .star.on{ background: var(--high); }
.event.mid .event-impact .star.on{ background: var(--mid); }
.event.low .event-impact .star.on{ background: var(--low); }

.event-title{
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}

.event-data{
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 10px;
}
.data-cell{ text-align: center; }
.data-label{
  font-family: 'Inter', sans-serif;
  font-size: 8.5px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.data-value{
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1;
}
.data-value.actual{
  color: var(--high);
}
.data-value.pending{
  color: var(--ink-soft);
  font-size: 14px;
}

/* Hinata comment in event */
.event-comment{
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 0 0;
  border-top: 1px solid var(--line);
}
.event-comment .mini-face{
  width: 26px; height: 26px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--line);
  flex-shrink: 0;
}
.event-comment .comment-text{
  flex: 1;
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--ink-mid);
  font-weight: 400;
}
.event-comment .comment-text .name{
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  color: var(--ink);
  margin-right: 4px;
  font-size: 11px;
}

.event-countdown{
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 600;
  color: var(--rose);
  background: var(--rose-soft);
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.05em;
  margin-top: 6px;
}
.event-countdown .pulse{
  width: 5px; height: 5px;
  background: var(--rose);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse{
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.event-passed{
  display: inline-block;
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  color: var(--ink-soft);
  background: var(--bg-soft);
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.08em;
  margin-top: 6px;
}

/* DATA SOURCE NOTE */
.source-note{
  position: relative; z-index: 5;
  text-align: center;
  padding: 24px 18px 8px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  color: var(--ink-soft);
  font-weight: 400;
  letter-spacing: 0.05em;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
}
.source-note .dot{
  width: 5px; height: 5px;
  background: var(--sage);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

/* BOTTOM NAV */
.bottom-nav{
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(255, 254, 251, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  padding: 10px 16px 22px;
  display: flex; justify-content: space-around;
  z-index: 100;
}
.nav-item{
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 4px 8px;
  letter-spacing: 0.04em;
  min-width: 56px;
  text-decoration: none;
}
.nav-item.active{ color: var(--rose); }
.nav-item.active .ico{ background: var(--rose-soft); color: var(--rose); }
.nav-item .ico{
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  transition: all 0.2s;
}
.nav-item .ico svg{ width: 16px; height: 16px; }
