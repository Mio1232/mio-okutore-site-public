<style>
:root{
  --bg: #F7F2EA;
  --bg-soft: #EFE7DA;
  --bg-card: #FFFEFB;
  --ink: #3A2E2A;
  --ink-mid: #6B5D57;
  --ink-soft: #998B83;
  --rose: #C98B95;
  --rose-soft: #E8D0D2;
  --sage: #9BB59C;
  --sage-soft: #D5DFCE;
  --honey: #D4B677;
  --honey-soft: #ECDDB8;
  --mauve: #A89BB0;
  --mauve-soft: #DCD3DC;
  --terra: #C28D6F;
  --terra-soft: #E8D5C5;
  --line: rgba(58,46,42,0.08);
  --line-strong: rgba(58,46,42,0.14);
  --shadow-sm: 0 2px 8px rgba(58,46,42,0.04);
  --shadow-md: 0 8px 24px rgba(58,46,42,0.06);
  --r-lg: 20px;
  --r-md: 16px;
  --r-sm: 12px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family: 'Noto Sans JP', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-weight: 400;
  letter-spacing: 0.01em;
  overflow-x: hidden;
  font-feature-settings: "palt";
}

.app{
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 100px;
  overflow: hidden;
}
.app::before{
  content:''; position: absolute;
  top: -80px; right: -120px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(168,155,176,0.10), transparent 70%);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}
.app::after{
  content:''; position: absolute;
  top: 600px; left: -120px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(212,182,119,0.08), transparent 70%);
  border-radius: 50%;
  z-index: 0; pointer-events: none;
}

/* HEADER */
.page-header{
  position: sticky; top: 0; z-index: 50;
  background: rgba(247,242,234,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.back-btn{
  width: 36px; height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  color: var(--ink-mid); text-decoration: none;
}
.back-btn:active{ transform: scale(0.96); }
.back-btn svg{ width: 16px; height: 16px; }
.page-title{
  flex: 1;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: 0.04em;
}
.page-title .en{
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 500;
  font-size: 12px; color: var(--ink-soft);
  margin-left: 6px;
}
.header-icon{
  width: 36px; height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--ink-mid);
  text-decoration: none;
}
.header-icon svg{ width: 15px; height: 15px; }

/* HOST CARD */
.host-card{
  position: relative; z-index: 5;
  margin: 16px 18px 18px;
  padding: 18px 20px;
  background: linear-gradient(135deg, #F5EFE5 0%, #EBE0D0 100%);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  display: flex; gap: 14px; align-items: flex-start;
}
.host-face{
  width: 48px; height: 48px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--bg-card);
  box-shadow: 0 4px 12px rgba(58,46,42,0.10);
  flex-shrink: 0;
}
.host-body{ flex: 1; min-width: 0; }
.host-name-row{
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.host-name{
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.host-tag{
  font-family: 'Inter', sans-serif;
  font-size: 8.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--rose);
  background: var(--rose-soft);
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}
.host-msg{
  font-size: 11.5px;
  line-height: 1.7;
  color: var(--ink-mid);
}
.host-msg .em{ color: var(--ink); font-weight: 600; }

/* CATEGORY TABS */
.cat-tabs{
  position: relative; z-index: 5;
  display: flex;
  gap: 6px;
  padding: 0 18px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar{ display: none; }
.cat-tab{
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 7px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: var(--bg-card);
  color: var(--ink-mid);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
}
.cat-tab.active{
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* DAY DIVIDER */
.day-divider{
  position: relative; z-index: 5;
  display: flex; align-items: center; gap: 12px;
  padding: 8px 22px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  color: var(--ink-soft);
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.day-divider::before,
.day-divider::after{
  content:''; flex: 1; height: 1px;
  background: var(--line-strong);
}

/* NEWS LIST */
.news-list{
  position: relative; z-index: 5;
  padding: 0 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.news-item{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  color: inherit;
  display: block;
  transition: transform 0.2s;
  position: relative;
}
.news-item:active{ transform: translateY(1px); }

.news-meta{
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.news-cat{
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
}
.cat-us{ background: var(--mauve-soft); color: #6E5F7E; }
.cat-jp{ background: var(--rose-soft); color: #8B5A65; }
.cat-policy{ background: var(--honey-soft); color: #8B7036; }
.cat-other{ background: var(--sage-soft); color: #5E7A60; }

.news-source{
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 4px;
}
.news-source svg{ width: 9px; height: 9px; }
.news-time{
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  color: var(--ink-soft);
  font-weight: 500;
  margin-left: auto;
}

.news-title{
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.55;
  color: var(--ink);
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.news-link-row{
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 10px;
}
.news-read{
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-mid);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 4px;
}
.news-read svg{ width: 11px; height: 11px; }

.news-comment{
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.comment-face{
  width: 26px; height: 26px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--line);
  flex-shrink: 0;
}
.comment-text{
  flex: 1;
  font-size: 11.5px;
  line-height: 1.65;
  color: var(--ink-mid);
}
.comment-text .name{
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  color: var(--ink);
  margin-right: 4px;
  font-size: 11px;
}

/* LOCKED comment indicator */
.news-comment-locked{
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  background: rgba(201,139,149,0.08);
  border: 1px dashed rgba(176,107,117,0.3);
  border-radius: 10px;
  font-size: 11px;
  color: var(--rose-deep, #B06B75);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.lock-mini{ width: 13px; height: 13px; flex-shrink: 0; }

/* EMPTY */
.empty-state{
  position: relative; z-index: 5;
  text-align: center;
  padding: 60px 24px;
}
.empty-icon{
  width: 56px; height: 56px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
}
.empty-icon svg{ width: 24px; height: 24px; }
.empty-title{
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-mid);
  margin-bottom: 4px;
}
.empty-desc{
  font-size: 11px;
  color: var(--ink-soft);
}

.loading-state{
  text-align: center;
  padding: 60px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
}

/* SOURCE NOTE */
.source-note{
  position: relative; z-index: 5;
  text-align: center;
  padding: 28px 18px 8px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px;
  color: var(--ink-soft);
  font-weight: 400;
  letter-spacing: 0.05em;
  line-height: 1.6;
}

/* BOTTOM NAV */
.bottom-nav{
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(255, 254, 251, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  padding: 10px 16px 22px;
  display: flex; justify-content: space-around;
  z-index: 100;
}
.nav-item{
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 9.5px; font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 4px 8px;
  letter-spacing: 0.04em;
  min-width: 56px;
  text-decoration: none;
}
.nav-item.active{ color: var(--rose); }
.nav-item.active .ico{ background: var(--rose-soft); color: var(--rose); }
.nav-item .ico{
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  transition: all 0.2s;
}
.nav-item .ico svg{ width: 16px; height: 16px; }

const CAT_LABELS = { us: '米国市況', jp: '日本市況', policy: '経済政策', other: 'その他' };

let allNews = [];
let activeCat = 'all';

function escapeHtml(s) {
  if (s == null) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function formatDayHeader(dateStr) {
  const d = new Date(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  const target = new Date(d); target.setHours(0,0,0,0);
  const dows = ['日','月','火','水','木','金','土'];
  const text = `${d.getMonth()+1}月${d.getDate()}日(${dows[d.getDay()]})`;
  if (target.getTime() === today.getTime()) return `Today · ${text}`;
  if (target.getTime() === yesterday.getTime()) return `Yesterday · ${text}`;
  return text;
}

function formatTime(dateStr) {
  const d = new Date(dateStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getDomain(url) {
  try {
    return new URL(url).hostname.replace(/^www\./, '');
  } catch (e) {
    return '';
  }
}

  // Show lock badge only when mio actually wrote a comment
  const comment = n.comment
    ? `<div class="news-comment-locked">
        <svg class="lock-mini" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <span>mioの見解はコミュニティ参加者限定です</span>
      </div>`
    : '';

  return `
    <a class="news-item" href="${escapeHtml(n.url)}" target="_blank" rel="noopener">
      <div class="news-meta">
        <span class="news-cat ${catClass}">${catLabel}</span>
        <span class="news-source">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ${escapeHtml(n.source || domain)}
        </span>
        <span class="news-time">${formatTime(n.timestamp)}</span>
      </div>
      <div class="news-title">${escapeHtml(n.title)}</div>
      <div class="news-link-row">
        <div class="news-read">
          元記事を読む
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
      ${comment}
    </a>
  `;
}

function groupByDate(items) {
  const groups = {};
  items.forEach(n => {
    const d = new Date(n.timestamp);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });
  return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
}

function render() {
  const container = document.getElementById('news-container');
  let filtered = allNews;
  if (activeCat !== 'all') {
    filtered = allNews.filter(n => (n.category || 'other') === activeCat);
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></svg>
        </div>
        <div class="empty-title">まだニュースがありません</div>
        <div class="empty-desc">管理画面から記事を追加できます</div>
      </div>
    `;
    return;
  }

  const groups = groupByDate(filtered);
  groups.forEach(([_, ns]) => ns.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));

  const html = groups.map(([date, ns]) => `
    <div class="day-divider">${formatDayHeader(date)}</div>
    <div class="news-list">
      ${ns.map(renderItem).join('')}
    </div>
  `).join('');

  container.innerHTML = html;
}

async function load() {
  let news = [];
  try {
    const { data, error } = await sb
      .from('news_items')
      .select('*')
      .order('timestamp', { ascending: false });
    if (error) throw error;
    news = (data || []).map(row => ({
      id: row.id,
      title: row.title,
      url: row.url,
      comment: row.comment || '',
      timestamp: row.timestamp,
      category: row.category || 'us',
      source: row.source || '',
      author: row.author || 'mio'
    }));
  } catch (err) {
    console.error('Load error:', err);
    news = [];
  }
  allNews = news;
  render();
}

// Category tab clicks
document.querySelectorAll('.cat-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeCat = t.dataset.cat;
    render();
  });
});

load();
</script>

</body>
</html>
